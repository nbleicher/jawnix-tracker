<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jawnix Admin</title><script src="/config.js"></script><link rel="stylesheet" href="/theme.css">
  <style>
    body{background:var(--bg);padding:28px}.shell{max-width:1180px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.tabs{display:flex;gap:8px;margin-bottom:20px}.tab.active{background:var(--navy);color:white}.pane{display:none}.pane.active{display:block}.card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.row{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.states{color:var(--blue);font-size:12px}.status{text-transform:uppercase;font-size:11px;font-weight:700}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.mapping{display:grid;grid-template-columns:1fr minmax(180px,300px) auto;gap:12px;align-items:end}@media(max-width:700px){.mapping{grid-template-columns:1fr}.row{display:block}}
  </style>
</head>
<body><main class="shell">
  <header class="top"><div><div class="logo">JAWN<span>IX</span></div><small>Batch administration — billing disabled</small></div><button class="btn" id="sign-out">Sign out</button></header>
  <nav class="tabs"><button class="btn tab active" data-pane="requests">Requests</button><button class="btn tab" data-pane="recipients">Recipients</button><button class="btn tab" data-pane="customers">Create customer</button></nav>
  <section class="pane active" id="pane-requests"><div id="requests"><div class="msg-info">Loading requests…</div></div></section>
  <section class="pane" id="pane-recipients"><div class="card"><div class="row"><div><h2>Recipient mappings</h2><p>Every customer must be synchronized to one distribution agent and explicitly confirmed.</p></div><div class="actions"><button class="btn" id="sync-recipients">Sync Supabase users</button><button class="btn" id="refresh-recipients">Refresh</button></div></div></div><div id="recipients"></div></section>
  <section class="pane" id="pane-customers"><form class="card" id="customer-form"><h2>Create Supabase customer</h2><div class="grid"><div class="field"><label>Email</label><input id="customer-email" type="email" required></div><div class="field"><label>Password</label><input id="customer-password" type="password" minlength="8" required></div><div class="field"><label>First name</label><input id="customer-first"></div><div class="field"><label>Last name</label><input id="customer-last"></div></div><button class="btn btn-primary" type="submit">Create unmapped customer</button><div id="customer-message"></div></form></section>
</main>
<script>
function csrf(){return decodeURIComponent((document.cookie.split('; ').find(row=>row.startsWith('jawnix_csrf='))||'=').split('=')[1]);}
async function api(path,options={}){options.credentials='same-origin';options.headers={...(options.headers||{})};if(options.body)options.headers['Content-Type']='application/json';if(!['GET','HEAD'].includes(options.method||'GET'))options.headers['X-CSRF-Token']=csrf();const response=await fetch(path,options);if(response.status===401||response.status===403){location.replace('/login.html?next=/admin.html');throw new Error('Admin login required');}const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.detail||'Request failed');return data;}
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
async function loadRequests(){const items=await api('/api/admin/requests');document.getElementById('requests').innerHTML=items.length?items.map(item=>`<article class="card"><div class="row"><div><strong>${esc(item.customer)}</strong><div>${esc(item.email)} · ${esc(item.agent)}</div></div><span class="status">${esc(item.status.replaceAll('_',' '))}</span></div><h3>${Number(item.leadCount).toLocaleString()} rows</h3><div class="states">${item.states.map(esc).join(', ')}</div><p>${esc(item.statusMessage)}</p><div class="actions">${item.status==='pending'?`<button class="btn btn-primary" data-action="approve" data-id="${item.id}">Approve</button><button class="btn" data-action="reject" data-id="${item.id}">Reject</button>`:''}${item.status==='waiting_inventory'?`<button class="btn btn-primary" data-action="retry" data-id="${item.id}">Retry</button><button class="btn" data-action="reject" data-id="${item.id}">Reject</button>`:''}${item.status==='failed'?`<button class="btn btn-primary" data-action="${item.hasArtifact?'retry_delivery':'retry'}" data-id="${item.id}">${item.hasArtifact?'Retry delivery':'Retry generation'}</button>`:''}</div></article>`).join(''):'<div class="empty-state">No requests.</div>';document.querySelectorAll('[data-action]').forEach(button=>button.onclick=async()=>{button.disabled=true;try{await api(`/api/admin/requests/${button.dataset.id}/${button.dataset.action}`,{method:'POST'});await loadRequests();}catch(error){alert(error.message);button.disabled=false;}});}
async function loadRecipients(){const data=await api('/api/admin/recipients');document.getElementById('recipients').innerHTML=data.recipients.map(item=>`<article class="card mapping"><div><strong>${esc(item.name||item.email)}</strong><div>${esc(item.email)}</div><div class="states">${item.states.map(esc).join(', ')||'No saved states'}</div><small>${item.confirmed?'Confirmed':'Not confirmed'}</small></div><div class="field"><label>Distribution agent</label><select data-agent="${item.userId}"><option value="">Select agent…</option>${data.agents.map(agent=>`<option value="${agent.id}" ${agent.id===item.agentId?'selected':''}>${esc(agent.name)}${agent.agency?' — '+esc(agent.agency):''}</option>`).join('')}</select></div><button class="btn btn-primary" data-map="${item.userId}">Save and confirm</button></article>`).join('');document.querySelectorAll('[data-map]').forEach(button=>button.onclick=async()=>{const agentId=Number(document.querySelector(`[data-agent="${button.dataset.map}"]`).value);if(!agentId)return alert('Select an agent.');await api('/api/admin/recipients/'+button.dataset.map,{method:'PATCH',body:JSON.stringify({agent_id:agentId,confirmed:true})});await loadRecipients();});}
document.querySelectorAll('[data-pane]').forEach(button=>button.onclick=()=>{document.querySelectorAll('[data-pane]').forEach(b=>b.classList.toggle('active',b===button));document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+button.dataset.pane));if(button.dataset.pane==='recipients')loadRecipients();});document.getElementById('refresh-recipients').onclick=loadRecipients;
document.getElementById('sync-recipients').onclick=async()=>{const result=await api('/api/admin/recipients/sync',{method:'POST'});alert(`Synced ${result.seen} customers; ${result.proposedMappings} mappings proposed. Confirm every mapping before enabling requests.`);await loadRecipients();};
document.getElementById('customer-form').onsubmit=async event=>{event.preventDefault();try{await api('/api/admin/customers',{method:'POST',body:JSON.stringify({email:document.getElementById('customer-email').value,first_name:document.getElementById('customer-first').value,last_name:document.getElementById('customer-last').value,password:document.getElementById('customer-password').value})});document.getElementById('customer-message').innerHTML='<div class="msg-ok">Customer created. Confirm their agent mapping before enabling requests.</div>';event.target.reset();}catch(error){document.getElementById('customer-message').innerHTML=`<div class="msg-err">${esc(error.message)}</div>`;}};
document.getElementById('sign-out').onclick=async()=>{await api('/api/auth/logout',{method:'POST'}).catch(()=>{});location.assign('/login.html');};loadRequests().catch(error=>alert(error.message));
</script></body></html>
