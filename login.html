<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jawnix Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <link rel="stylesheet" href="/theme.css">
</head>
<body class="auth-page">
<main class="auth-shell">
  <div class="auth-brand"><div class="logo">JAWN<span>IX</span></div><p>Customer batch portal</p></div>
  <section class="auth-card">
    <h1>Sign in</h1>
    <div class="error" id="message" hidden></div>
    <form id="login-form">
      <div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="email" required autofocus></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" autocomplete="current-password" required></div>
      <button class="btn btn-primary" id="submit" type="submit">Sign in</button>
    </form>
    <a class="auth-link" href="#" id="forgot-password">Forgot password?</a>
  </section>
</main>
<script>
const cfg=window.JAWNIX_CONFIG||{};
const supabaseClient=window.supabase?.createClient?.(cfg.supabaseUrl,cfg.supabaseAnonKey);
const form=document.getElementById('login-form'),message=document.getElementById('message'),button=document.getElementById('submit');
const requestedNext=new URLSearchParams(location.search).get('next');
function show(text,ok=false){message.hidden=false;message.className=ok?'msg-ok':'error';message.textContent=text;}
async function establish(session){
  const response=await fetch('/api/auth/session',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({access_token:session.access_token})});
  const data=await response.json();
  if(!response.ok)throw new Error(data.detail||'Could not create your Jawnix session.');
  const safe=requestedNext&&requestedNext.startsWith('/')&&!requestedNext.startsWith('//')?requestedNext:data.next;
  location.assign(safe);
}
form.addEventListener('submit',async event=>{
  event.preventDefault();button.disabled=true;button.textContent='Signing in...';message.hidden=true;
  try{
    if(!supabaseClient)throw new Error('Login configuration is unavailable.');
    const {data,error}=await supabaseClient.auth.signInWithPassword({email:form.email.value.trim(),password:form.password.value});
    if(error)throw error;await establish(data.session);
  }catch(error){show(error.message||'Login failed.');button.disabled=false;button.textContent='Sign in';}
});
document.getElementById('forgot-password').addEventListener('click',async event=>{
  event.preventDefault();
  try{
    const email=form.email.value.trim();if(!email)throw new Error('Enter your email first.');
    const {error}=await supabaseClient.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/portal-accept.html'});
    if(error)throw error;show('Check your email for the reset link.',true);
  }catch(error){show(error.message||'Could not send reset email.');}
});
(async()=>{if(!supabaseClient)return;const {data:{session}}=await supabaseClient.auth.getSession();if(session){try{await establish(session);}catch(_error){}}})();
</script>
</body>
</html>
