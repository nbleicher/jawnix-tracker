<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jawnix Customer Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <link rel="stylesheet" href="/theme.css">
  <style>
    .portal-shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.portal-sidebar{background:var(--navy);color:white;padding:26px 20px;display:flex;flex-direction:column;gap:28px}.portal-main{padding:34px;max-width:1120px;width:100%}.portal-nav{display:grid;gap:8px}.portal-nav button{background:transparent;border:0;color:#cbd5e1;text-align:left;padding:10px 12px;cursor:pointer}.portal-nav button.active{background:#ffffff18;color:white}.portal-user{margin-top:auto;font-size:12px;word-break:break-word}.portal-pane{display:none}.portal-pane.active{display:block}.portal-grid{display:grid;grid-template-columns:minmax(280px,420px) 1fr;gap:20px}.portal-card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px}.states-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}.state-check{display:flex;gap:7px;align-items:center;border:1px solid var(--border);padding:8px}.request-row{border-bottom:1px solid var(--border);padding:14px 0}.request-top{display:flex;justify-content:space-between;gap:12px}.state-chip{display:inline-block;padding:3px 7px;background:var(--blue-lt);color:var(--blue);margin:2px;font-size:12px}.mode-target{display:none;margin-top:12px}.mode-target.active{display:block}.mapping-warning{background:#fff7ed;color:#9a3412;padding:12px;margin-bottom:16px}.portal-heading{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.status{font-size:11px;text-transform:uppercase;font-weight:700}.status.delivered{color:var(--green)}.status.failed,.status.rejected{color:var(--red)}
    @media(max-width:800px){.portal-shell{display:block}.portal-sidebar{min-height:auto}.portal-grid{grid-template-columns:1fr}.portal-main{padding:20px}.portal-nav{grid-template-columns:1fr 1fr}.portal-user{margin-top:0}}
  </style>
</head>
<body>
<main class="portal-shell">
  <aside class="portal-sidebar">
    <div><div class="logo">JAWN<span>IX</span></div><small>Customer portal</small></div>
    <nav class="portal-nav"><button class="active" data-pane="requests">Requests</button><button data-pane="profile">Profile</button></nav>
    <div class="portal-user"><div id="user-email"></div><button type="button" id="sign-out">Sign out</button></div>
  </aside>
  <section class="portal-main">
    <section class="portal-pane active" id="pane-requests">
      <div class="portal-heading"><div><h1>Lead requests</h1><p>Choose your state targeting and request an exact batch.</p></div></div>
      <div id="mapping-warning" class="mapping-warning" hidden>Your account must be mapped and confirmed by Jawnix before you can submit requests.</div>
      <div class="portal-grid">
        <section class="portal-card">
          <h2>Request a batch</h2>
          <form id="request-form">
            <div class="field"><label for="lead-count">Number of rows</label><input id="lead-count" type="number" min="1" max="100000" required></div>
            <div class="quick-picks" id="quick-picks"></div>
            <div class="field"><label><input type="radio" name="state-mode" value="all_saved" checked> Use all saved states</label></div>
            <div class="field"><label><input type="radio" name="state-mode" value="selected"> Target selected states</label></div>
            <div class="mode-target" id="target-states"><div class="states-grid" id="request-states"></div></div>
            <button class="btn btn-primary" id="request-submit" type="submit">Submit request</button>
          </form>
          <div id="request-message"></div>
        </section>
        <section class="portal-card"><h2>Your requests</h2><div id="request-list"></div></section>
      </div>
    </section>
    <section class="portal-pane" id="pane-profile">
      <div class="portal-heading"><div><h1>Profile</h1><p>Maintain the states that may be targeted by your requests.</p></div></div>
      <form class="portal-card" id="profile-form">
        <div class="profile-grid">
          <div class="field"><label for="first-name">First name</label><input id="first-name" required></div>
          <div class="field"><label for="last-name">Last name</label><input id="last-name" required></div>
          <div class="field"><label for="email">Email</label><input id="email" readonly></div>
          <div class="field"><label for="phone">Phone</label><input id="phone" type="tel"></div>
        </div>
        <div class="states-toolbar"><strong>Licensed states</strong><span><button type="button" id="all-states">Select all</button> <button type="button" id="clear-states">Clear</button></span></div>
        <div class="states-grid" id="profile-states"></div>
        <button class="btn btn-primary" type="submit" style="margin-top:18px">Save profile</button>
        <div id="profile-message"></div>
      </form>
    </section>
  </section>
</main>
<script>
const cfg=window.JAWNIX_CONFIG||{},supabaseClient=window.supabase?.createClient?.(cfg.supabaseUrl,cfg.supabaseAnonKey);
const STATES='AL AK AZ AR CA CO CT DE FL GA HI ID IL IN IA KS KY LA ME MD MA MI MN MS MO MT NE NV NH NJ NM NY NC ND OH OK OR PA RI SC SD TN TX UT VT VA WA WV WI WY DC'.split(' ');
let profile=null,requests=[];
function csrf(){return decodeURIComponent((document.cookie.split('; ').find(row=>row.startsWith('jawnix_csrf='))||'=').split('=')[1]);}
async function api(path,options={}){options.credentials='same-origin';options.headers={...(options.headers||{})};if(options.body)options.headers['Content-Type']='application/json';if(!['GET','HEAD'].includes(options.method||'GET'))options.headers['X-CSRF-Token']=csrf();const response=await fetch(path,options);if(response.status===401){location.replace('/login.html?next=/portal.html');throw new Error('Login required');}const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.detail||'Request failed');return data;}
function stateChecks(container,selected){container.innerHTML=STATES.map(state=>`<label class="state-check"><input type="checkbox" value="${state}" ${selected.includes(state)?'checked':''}> ${state}</label>`).join('');}
function message(id,text,ok=true){const host=document.getElementById(id),box=document.createElement('div');box.className=ok?'msg-ok':'msg-err';box.textContent=text;host.replaceChildren(box);}
function render(){
  document.getElementById('user-email').textContent=profile.email;document.getElementById('email').value=profile.email;document.getElementById('first-name').value=profile.first_name;document.getElementById('last-name').value=profile.last_name;document.getElementById('phone').value=profile.phone;
  stateChecks(document.getElementById('profile-states'),profile.licensed_states);stateChecks(document.getElementById('request-states'),profile.licensed_states);
  const mapped=Boolean(profile.agent_id&&profile.mapping_confirmed_at);document.getElementById('mapping-warning').hidden=mapped;document.getElementById('request-submit').disabled=!mapped||!profile.licensed_states.length;
  document.getElementById('request-list').innerHTML=requests.length?requests.map(item=>`<article class="request-row"><div class="request-top"><strong>${item.lead_count.toLocaleString()} rows</strong><span class="status ${item.status}">${item.status.replaceAll('_',' ')}</span></div><div>${item.states_snapshot.map(s=>`<span class="state-chip">${s}</span>`).join('')}</div><small>${new Date(item.created_at).toLocaleString()}</small>${item.status_message?`<p>${item.status_message}</p>`:''}${item.status==='pending'?`<button class="btn btn-sm" data-cancel="${item.id}">Cancel</button>`:''}</article>`).join(''):'<div class="empty-state">No requests yet.</div>';
  document.querySelectorAll('[data-cancel]').forEach(button=>button.onclick=async()=>{if(!confirm('Cancel this pending request?'))return;await api('/api/me/requests/'+button.dataset.cancel,{method:'DELETE'});await load();});
}
async function load(){[profile,requests]=await Promise.all([api('/api/me/profile'),api('/api/me/requests')]);render();}
document.getElementById('quick-picks').innerHTML=[1000,5000,10000,25000,50000,100000].map(n=>`<button type="button" data-count="${n}">${n.toLocaleString()}</button>`).join('');document.querySelectorAll('[data-count]').forEach(button=>button.onclick=()=>document.getElementById('lead-count').value=button.dataset.count);
document.querySelectorAll('[name=state-mode]').forEach(input=>input.onchange=()=>document.getElementById('target-states').classList.toggle('active',input.value==='selected'&&input.checked));
document.getElementById('request-form').onsubmit=async event=>{event.preventDefault();try{const mode=document.querySelector('[name=state-mode]:checked').value;const states=[...document.querySelectorAll('#request-states input:checked')].map(i=>i.value);await api('/api/me/requests',{method:'POST',body:JSON.stringify({lead_count:Number(document.getElementById('lead-count').value),state_mode:mode,states})});message('request-message','Request submitted for Slack approval.');event.target.reset();document.getElementById('target-states').classList.remove('active');await load();}catch(error){message('request-message',error.message,false);}};
document.getElementById('profile-form').onsubmit=async event=>{event.preventDefault();try{profile=await api('/api/me/profile',{method:'PATCH',body:JSON.stringify({first_name:document.getElementById('first-name').value.trim(),last_name:document.getElementById('last-name').value.trim(),phone:document.getElementById('phone').value.trim(),licensed_states:[...document.querySelectorAll('#profile-states input:checked')].map(i=>i.value)})});message('profile-message','Profile saved.');render();}catch(error){message('profile-message',error.message,false);}};
document.getElementById('all-states').onclick=()=>document.querySelectorAll('#profile-states input').forEach(i=>i.checked=true);document.getElementById('clear-states').onclick=()=>document.querySelectorAll('#profile-states input').forEach(i=>i.checked=false);
document.querySelectorAll('[data-pane]').forEach(button=>button.onclick=()=>{document.querySelectorAll('[data-pane]').forEach(b=>b.classList.toggle('active',b===button));document.querySelectorAll('.portal-pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+button.dataset.pane));});
document.getElementById('sign-out').onclick=async()=>{await api('/api/auth/logout',{method:'POST'}).catch(()=>{});await supabaseClient?.auth.signOut();location.assign('/login.html');};
load().catch(error=>alert(error.message));
</script>
</body>
</html>
